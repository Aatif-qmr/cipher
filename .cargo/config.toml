# macOS ARM64: suppress undefined-symbol errors for `cargo test` on PyO3 cdylibs.
# When loaded as a Python extension (maturin develop), symbols resolve from the
# running Python process — do NOT link libpython explicitly here.
# For unit tests that don't embed Python, use `cargo test --features pyo3/auto-initialize`.
[target.aarch64-apple-darwin]
rustflags = ["-C", "link-arg=-undefined", "-C", "link-arg=dynamic_lookup"]
